# Deploy: copy to /Users/mac/.doc-cloud/config/ then reload nginx
worker_processes 1;
error_log /Users/mac/.doc-cloud/logs/product-design-luyaxiang.nginx.error.log info;
pid       /Users/mac/.doc-cloud/logs/product-design-luyaxiang.nginx.pid;

events { worker_connections 1024; }

http {
  include /opt/homebrew/etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /Users/mac/.doc-cloud/logs/product-design-luyaxiang.nginx.access.log;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 127.0.0.1:5191;
    server_name productDesign.luyaxiang.com;

    location / {
      proxy_pass http://127.0.0.1:3016;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      client_max_body_size 50m;
    }
  }
}
